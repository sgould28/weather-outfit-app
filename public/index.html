<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Outfit Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>    
<div id= "top">
    <h1>Weather-Based Outfit Picker</h1>
</div>
<div id="container">
    <div id="main-panel">
        <div class="controls-panel">
            <div class="controls-column controls-main">
                <div class="controls-row">
                    <input id="cityInput" placeholder="Enter a city">
                    <select id="unitSelect">
                        <option value="metric">Celsius (°C)</option>
                        <option value="imperial">Fahrenheit (°F)</option>
                    </select>
                </div>
                <div class="section-label">Aesthetic</div>
                <div class="aesthetic-buttons">
                    <button type="button" class="aesthetic-btn active" data-value="cute">Cute</button>
                    <button type="button" class="aesthetic-btn" data-value="edgy">Edgy</button>
                    <button type="button" class="aesthetic-btn" data-value="casual">Casual</button>
                </div>
                <button id="getOutfitBtn" class="primary-btn">Get Outfit</button>
            </div>
        </div>
        <div class="output-panel">
            <div id="result"></div>
        </div>
    </div>
</div>
<script src="app.js"></script>
    
</body>
</html>
