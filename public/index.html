<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Outfit Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Weather-Based Outfit Picker</h1>

    <input id="cityInput" placeholder="Enter a city">
    <select id="aestheticSelect">
        <option value="casual">Casual</option>
        <option value="formal">Formal</option>
        <option value="sporty">Sporty</option>
    </select>
    <button id="getOutfitBtn">Get Outfit</button>

    <div id="result"></div>

    <script src="app.js"></script>
</body>
</html>
